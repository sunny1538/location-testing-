<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEOLOCATE // Field Position Reader</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --void:      #0B1620;
    --panel:     #101F2C;
    --panel-hi:  #16293A;
    --line:      #24384A;
    --amber:     #F2A93C;
    --amber-dim: #8A6528;
    --text-hi:   #EAF0F4;
    --text-mid:  #8FA3B3;
    --text-low:  #52697C;
    --ok:        #5FD3A3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--void);
    font-family: 'Inter', sans-serif;
    color: var(--text-hi);
    overflow: hidden;
  }

  #map {
    position: absolute;
    inset: 0;
    filter: saturate(0.9) brightness(0.92);
  }

  /* faint scan-grid overlay across whole viewport, instrument feel */
  .grid-overlay {
    position: absolute;
    inset: 0;
    z-index: 400;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(242,169,60,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(242,169,60,0.035) 1px, transparent 1px);
    background-size: 48px 48px;
    mix-blend-mode: overlay;
  }

  /* ---------- top bar / brand ---------- */
  .topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    pointer-events: none;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    pointer-events: auto;
  }
  .brand .mark {
    width: 9px; height: 9px;
    border: 1.5px solid var(--amber);
    transform: rotate(45deg);
  }
  .brand span {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.14em;
    color: var(--text-hi);
  }
  .brand small {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--text-low);
  }

  .layer-toggle {
    display: flex;
    gap: 1px;
    background: var(--line);
    border-radius: 6px;
    overflow: hidden;
    pointer-events: auto;
    border: 1px solid var(--line);
  }
  .layer-toggle button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 8px 12px;
    background: var(--panel);
    color: var(--text-mid);
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .layer-toggle button.active {
    background: var(--amber);
    color: #1A1204;
  }
  .layer-toggle button:hover:not(.active) {
    background: var(--panel-hi);
    color: var(--text-hi);
  }

  /* ---------- instrument console (bottom-left readout) ---------- */
  .console {
    position: absolute;
    left: 20px;
    bottom: 20px;
    z-index: 1000;
    width: 300px;
    background: rgba(16, 31, 44, 0.88);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    padding: 16px 16px 14px;
  }
  /* viewfinder corner brackets */
  .console::before, .console::after,
  .console .br-tl, .console .br-br { content: ''; position: absolute; width: 10px; height: 10px; }
  .console::before { top: -1px; left: -1px; border-top: 2px solid var(--amber); border-left: 2px solid var(--amber); }
  .console::after  { bottom: -1px; right: -1px; border-bottom: 2px solid var(--amber); border-right: 2px solid var(--amber); }

  .console-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .console-head h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-mid);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-low);
    box-shadow: 0 0 0 0 rgba(95,211,163,0.6);
  }
  .status-dot.live {
    background: var(--ok);
    animation: pulse-dot 1.6s infinite;
  }
  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(95,211,163,0.55); }
    70%  { box-shadow: 0 0 0 7px rgba(95,211,163,0); }
    100% { box-shadow: 0 0 0 0 rgba(95,211,163,0); }
  }

  .readout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 12px;
    margin-bottom: 14px;
  }
  .field {
    border-left: 2px solid var(--line);
    padding-left: 8px;
  }
  .field.wide { grid-column: 1 / -1; }
  .field label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-low);
    margin-bottom: 3px;
  }
  .field .val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-hi);
    letter-spacing: 0.01em;
  }
  .field.active { border-left-color: var(--amber); }
  .field .val.ok { color: var(--ok); }

  .locate-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px;
    background: var(--amber);
    border: none;
    color: #1A1204;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .locate-btn:hover { background: #FFBE5C; }
  .locate-btn:disabled { background: var(--amber-dim); color: rgba(0,0,0,0.4); cursor: not-allowed; }

  .locate-btn .sweep {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid rgba(26,18,4,0.35);
    border-top-color: #1A1204;
    display: none;
  }
  .locate-btn.loading .sweep {
    display: inline-block;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .msg {
    margin-top: 9px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-low);
    min-height: 12px;
  }
  .msg.err { color: #E8735C; }
  .msg.ok  { color: var(--ok); }

  /* custom "you are here" marker */
  .geo-pulse {
    width: 16px; height: 16px;
    position: relative;
  }
  .geo-pulse .core {
    width: 10px; height: 10px;
    background: var(--amber);
    border: 2px solid #1A1204;
    border-radius: 50%;
    position: absolute;
    top: 1px; left: 1px;
    z-index: 2;
  }
  .geo-pulse .ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1.5px solid var(--amber);
    opacity: 0.7;
    animation: ring-out 1.8s ease-out infinite;
  }
  @keyframes ring-out {
    0%   { transform: scale(0.4); opacity: 0.7; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  @media (max-width: 520px) {
    .console { left: 12px; right: 12px; bottom: 12px; width: auto; }
    .topbar { padding: 12px; }
    .brand small { display: none; }
  }
</style>
</head>
<body>

<div id="map"></div>
<div class="grid-overlay"></div>

<div class="topbar">
  <div class="brand">
    <div class="mark"></div>
    <span>GEOLOCATE</span>
    <small>FIELD POSITION READER</small>
  </div>
  <div class="layer-toggle">
    <button id="satBtn" class="active">SATELLITE</button>
    <button id="streetBtn">STREET</button>
  </div>
</div>

<div class="console">
  <div class="console-head">
    <h1>POSITION FIX</h1>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="readout">
    <div class="field" id="fLat"><label>LATITUDE</label><div class="val" id="lat">— — . — — — — °</div></div>
    <div class="field" id="fLng"><label>LONGITUDE</label><div class="val" id="lng">— — . — — — — °</div></div>
    <div class="field wide" id="fAcc"><label>ACCURACY RADIUS</label><div class="val" id="acc">— m</div></div>
    <div class="field wide" id="fSrc"><label>FIX SOURCE</label><div class="val" id="src">NO SIGNAL</div></div>
  </div>

  <button class="locate-btn" id="locateBtn">
    <span class="sweep"></span>
    <span id="btnLabel">ACQUIRE POSITION</span>
  </button>
  <div class="msg" id="status">Awaiting request…</div>
</div>

<script>
  // Base map — opens zoomed out to a full world view
  const map = L.map('map', { zoomControl: false, attributionControl: true }).setView([20, 0], 2);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  const satellite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: 'Tiles &copy; Esri', maxZoom: 19 }
  ).addTo(map);

  const street = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '&copy; OpenStreetMap contributors', maxZoom: 19 }
  );

  let marker = null;
  let accuracyCircle = null;

  const el = {
    lat: document.getElementById('lat'),
    lng: document.getElementById('lng'),
    acc: document.getElementById('acc'),
    src: document.getElementById('src'),
    fLat: document.getElementById('fLat'),
    fLng: document.getElementById('fLng'),
    fAcc: document.getElementById('fAcc'),
    fSrc: document.getElementById('fSrc'),
    status: document.getElementById('status'),
    dot: document.getElementById('statusDot'),
    btn: document.getElementById('locateBtn'),
    btnLabel: document.getElementById('btnLabel'),
  };

  function findLocation() {
    el.status.textContent = 'Requesting permission…';
    el.status.className = 'msg';
    el.btn.disabled = true;
    el.btn.classList.add('loading');
    el.btnLabel.textContent = 'ACQUIRING…';

    map.locate({
      setView: true,
      maxZoom: 17,
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    });
  }

  const pulseIcon = L.divIcon({
    className: '',
    html: '<div class="geo-pulse"><div class="ring"></div><div class="core"></div></div>',
    iconSize: [16, 16],
    iconAnchor: [8, 8]
  });

  map.on('locationfound', function (e) {
    el.btn.disabled = false;
    el.btn.classList.remove('loading');
    el.btnLabel.textContent = 'RE-ACQUIRE';
    el.status.textContent = 'Position fix acquired.';
    el.status.className = 'msg ok';
    el.dot.classList.add('live');

    if (marker) map.removeLayer(marker);
    if (accuracyCircle) map.removeLayer(accuracyCircle);

    marker = L.marker(e.latlng, { icon: pulseIcon }).addTo(map);
    accuracyCircle = L.circle(e.latlng, {
      radius: e.accuracy,
      color: '#F2A93C',
      weight: 1,
      fillColor: '#F2A93C',
      fillOpacity: 0.08
    }).addTo(map);

    el.lat.textContent = e.latlng.lat.toFixed(6) + '°';
    el.lng.textContent = e.latlng.lng.toFixed(6) + '°';
    el.acc.textContent = '± ' + Math.round(e.accuracy) + ' m';
    const highAcc = e.accuracy <= 50;
    el.src.textContent = highAcc ? 'GPS / HIGH ACCURACY' : 'WI-FI / NETWORK';
    el.src.classList.toggle('ok', highAcc);
    [el.fLat, el.fLng, el.fAcc, el.fSrc].forEach(f => f.classList.add('active'));
  });

  map.on('locationerror', function (e) {
    el.btn.disabled = false;
    el.btn.classList.remove('loading');
    el.btnLabel.textContent = 'ACQUIRE POSITION';
    el.status.textContent = 'Error: ' + e.message;
    el.status.className = 'msg err';
    el.dot.classList.remove('live');
  });

  el.btn.addEventListener('click', findLocation);

  const satBtn = document.getElementById('satBtn');
  const streetBtn = document.getElementById('streetBtn');

  satBtn.addEventListener('click', () => {
    map.removeLayer(street);
    map.addLayer(satellite);
    satBtn.classList.add('active');
    streetBtn.classList.remove('active');
  });

  streetBtn.addEventListener('click', () => {
    map.removeLayer(satellite);
    map.addLayer(street);
    streetBtn.classList.add('active');
    satBtn.classList.remove('active');
  });

  // Auto-run once on load
  findLocation();
</script>

</body>
</html>
